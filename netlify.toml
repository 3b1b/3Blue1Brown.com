[build]
command = "bun run build"
publish = "build/client"

[build.environment]
NODE_VERSION = "24"

[dev]
command = "bun run dev"

[[headers]]
for = "/*"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "https://3b1b.co/*"
to = "https://www.3blue1brown.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.3b1b.co/*"
to = "https://www.3blue1brown.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://3b1b.com/*"
to = "https://www.3blue1brown.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.3b1b.com/*"
to = "https://www.3blue1brown.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://3blue1brown.com/*"
to = "https://www.3blue1brown.com/:splat"
status = 301
force = true

[[redirects]]
from = "/*"
to = "/404"
status = 404
